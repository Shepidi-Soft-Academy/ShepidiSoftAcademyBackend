<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding: 40px 0">
                <table width="600" cellpadding="0" cellspacing="0"
                       style="background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">

                    <!-- HEADER -->
                    <tr>
                        <td style="background: #000000; padding: 32px; text-align: center">
                            <img src="{{LogoUrl}}" alt="Shepidi Soft Logo" width="400" height="400"
                                 style="display: block; margin: 0 auto 16px auto;" />
                            <h1 style="color: #fdec00; margin: 0; font-size: 24px">
                                Shepidi Soft Academy Ailesine Hoş Geldiniz
                            </h1>
                        </td>
                    </tr>

                    <!-- DIVIDER -->
                    <tr>
                        <td style="height: 2px; background-color: #FDEC00;"></td>
                    </tr>

                    <!-- BODY -->
                    <tr>
                        <td style="padding: 40px 32px; background-color: #000000">
                            <h2 style="color: #fdec00; margin: 0 0 16px">Hoş Geldiniz</h2>
                            <p style="color: #fdec00; line-height: 1.6; margin: 0 0 24px">
                                Değerli eğitmenimiz Sayın
                                <strong>{{FullName}}</strong> aramıza hoş geldiniz. Parolanız
                                telefon numaranızdır. Mail adresiniz ile sistemimize giriş
                                yapabilirsiniz.
                            </p>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td style="background: #fdec00; padding: 24px 32px; text-align: center;">
                            <p style="color: #000000; font-size: 12px; margin: 0; font-weight: bold;">
                                © 2026 Shepidi Soft Academy. Tüm hakları saklıdır.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
